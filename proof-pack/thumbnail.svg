<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g)" />

  <g transform="translate(80,80)">
    <!-- left icon: stylized symbol grid in a speech bubble -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" rx="36" ry="36" width="420" height="420" fill="#fff" opacity="0.06" />
    </g>

    <g transform="translate(30,30)">
      <path d="M60 0h240a60 60 0 0 1 60 60v120a30 30 0 0 1-30 30h-30v60l-60-60h-90a60 60 0 0 1-60-60V60A60 60 0 0 1 60 0z" fill="#ffffff" opacity="0.12" />
      <rect x="40" y="40" width="200" height="160" rx="12" fill="#ffffff" opacity="0.9"/>
      <g fill="#106EEA">
        <rect x="56" y="56" width="46" height="46" rx="8" />
        <rect x="110" y="56" width="46" height="46" rx="8" />
        <rect x="164" y="56" width="46" height="46" rx="8" />

        <rect x="56" y="110" width="46" height="46" rx="8" />
        <rect x="110" y="110" width="46" height="46" rx="8" />
        <rect x="164" y="110" width="46" height="46" rx="8" />
      </g>
      <circle cx="300" cy="120" r="34" fill="#fff" opacity="0.12" />
      <path d="M292 112h16v16h-16z" fill="#fff" transform="translate(292,112)" />
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(540,210)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="#fff">TalkBoard</text>
    <text x="0" y="72" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="500" font-size="28" fill="#F8FAFC" opacity="0.95">Inclusive AAC — adaptive, collaborative, and offline-capable</text>

    <rect x="0" y="110" width="560" height="2" fill="rgba(255,255,255,0.08)" rx="1" />

    <text x="0" y="170" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="400" font-size="20" fill="#EFF6FF" opacity="0.9">
      3-minute demo • 43 screenshots • 386 unit tests passing
    </text>
  </g>

  <!-- bottom right accent -->
  <g transform="translate(980,520)">
    <rect x="0" y="0" width="260" height="160" rx="20" fill="#FFFFFF" opacity="0.06" />
    <text x="20" y="46" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="600" font-size="18" fill="#fff">Built with</text>
    <text x="20" y="76" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="#fff" opacity="0.9">TypeScript · React · Vite · Tailwind</text>
  </g>

</svg>
